<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Famo CRM Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
  
  <div id="app" class="p-6 max-w-7xl mx-auto">
    <!-- Header -->
    <header class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-10">
      <div>
        <h1 class="text-3xl font-black tracking-tight text-slate-900">Famo Photo CRM</h1>
        <p class="text-slate-500 font-medium">Google Sheets Management Dashboard</p>
      </div>
      <div class="flex items-center gap-3">
        <button onclick="setupSheet()" class="px-5 py-2.5 bg-violet-600 text-white rounded-xl font-bold text-sm shadow-lg shadow-violet-100 hover:bg-violet-700 transition-all">
          Initialize Spreadsheet
        </button>
        <button onclick="loadData()" class="p-2.5 bg-white border border-slate-200 text-slate-600 rounded-xl hover:bg-slate-50 transition-all">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>
        </button>
      </div>
    </header>

    <!-- Stats -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
      <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
        <p class="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-1">Total Bookings</p>
        <h2 id="stat-total" class="text-3xl font-black text-slate-900">0</h2>
      </div>
      <div class="bg-emerald-50 p-6 rounded-[2rem] border border-emerald-100 shadow-sm">
        <p class="text-[10px] font-black uppercase text-emerald-600/60 tracking-widest mb-1">Completed Jobs</p>
        <h2 id="stat-completed" class="text-3xl font-black text-emerald-600">0</h2>
      </div>
      <div class="bg-amber-50 p-6 rounded-[2rem] border border-amber-100 shadow-sm">
        <p class="text-[10px] font-black uppercase text-amber-600/60 tracking-widest mb-1">Pending Sync</p>
        <h2 id="stat-pending" class="text-3xl font-black text-amber-600">0</h2>
      </div>
    </div>

    <!-- Main Table -->
    <div class="bg-white rounded-[2.5rem] border border-slate-200 shadow-xl overflow-hidden">
      <div class="p-8 border-b border-slate-100 flex items-center justify-between">
        <h3 class="font-black text-lg tracking-tight">Recent Bookings</h3>
        <div id="loading" class="hidden">
           <div class="flex items-center gap-2 text-violet-600 font-bold text-xs">
              <div class="w-4 h-4 border-2 border-violet-600 border-t-transparent rounded-full animate-spin"></div>
              Loading...
           </div>
        </div>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-left">
          <thead>
            <tr class="bg-slate-50/50">
              <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Client</th>
              <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Occasion</th>
              <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Date & Venue</th>
              <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Status</th>
              <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none"></th>
            </tr>
          </thead>
          <tbody id="table-body" class="divide-y divide-slate-50">
            <!-- Data loaded here -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // Helper to run Apps Script functions
    function run(fn, ...args) {
      return new Promise((resolve, reject) => {
        if (typeof google !== 'undefined' && google.script && google.script.run) {
          google.script.run
            .withSuccessHandler(resolve)
            .withFailureHandler(reject)[fn](...args);
        } else {
          console.warn("Google Apps Script environment not detected. Running mockup.");
          // In local dev, return mock data
          if (fn === 'fetchAllData') resolve([]);
          if (fn === 'setup') resolve("Mock Setup Successful");
        }
      });
    }

    async function setupSheet() {
      try {
        const msg = await run('setup');
        alert(msg);
      } catch (err) { alert("Error: " + err); }
    }

    async function loadData() {
      const loading = document.getElementById('loading');
      const body = document.getElementById('table-body');
      
      loading.classList.remove('hidden');
      try {
        const data = await run('fetchAllData');
        updateDashboard(data);
      } catch (err) {
        console.error(err);
      } finally {
        loading.classList.add('hidden');
      }
    }

    function updateDashboard(data) {
      const body = document.getElementById('table-body');
      const total = document.getElementById('stat-total');
      const completed = document.getElementById('stat-completed');
      
      total.innerText = data.length;
      body.innerHTML = '';
      
      if (data.length === 0) {
        body.innerHTML = '<tr><td colspan="5" class="px-8 py-10 text-center text-slate-400 font-medium">No bookings found. Click "Initialize" if this is your first time.</td></tr>';
        return;
      }

      data.forEach(item => {
        const row = document.createElement('tr');
        row.className = 'hover:bg-slate-50/50 transition-all group';
        row.innerHTML = `
          <td class="px-8 py-6">
            <div class="font-bold text-slate-900 leading-none mb-1">${item.coupleName || 'N/A'}</div>
            <div class="text-[10px] text-slate-400 font-medium">${item.email || ''}</div>
          </td>
          <td class="px-8 py-6">
            <span class="px-2 py-1 rounded-lg text-[9px] font-black uppercase tracking-widest ${getOccasionClass(item.occasion)}">
              ${item.occasion || 'N/A'}
            </span>
          </td>
          <td class="px-8 py-6">
            <div class="text-xs font-bold text-slate-600">${item.dateVenue || 'N/A'}</div>
          </td>
          <td class="px-8 py-6">
             <div class="flex items-center gap-2">
                <div class="w-1.5 h-1.5 rounded-full ${item.calendarEventId ? 'bg-emerald-500' : 'bg-slate-300'}"></div>
                <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">
                  ${item.calendarEventId ? 'Synced' : 'Local Only'}
                </span>
             </div>
          </td>
          <td class="px-8 py-6 text-right">
             <button class="p-2 text-slate-300 hover:text-violet-600 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
             </button>
          </td>
        `;
        body.appendChild(row);
      });
    }

    function getOccasionClass(o) {
      if (!o) return 'bg-slate-100 text-slate-500';
      if (o.includes('Wedding')) return 'bg-emerald-100 text-emerald-600';
      if (o.includes('Prewedding')) return 'bg-violet-100 text-violet-600';
      return 'bg-amber-100 text-amber-600';
    }

    // Auto-load on start
    window.onload = loadData;
  </script>
</body>
</html>
